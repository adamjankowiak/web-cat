openapi: 3.1.0
info:
  title: Web CAT API
  version: 0.1.0
  description: Initial API contract for the Web CAT platform.
servers:
  - url: http://localhost:8000
paths:
  /health:
    get:
      summary: API healthcheck
      operationId: getHealth
      tags:
        - system
      responses:
        "200":
          description: API status and version.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /documents:
    get:
      summary: List imported documents
      operationId: listDocuments
      tags:
        - documents
      responses:
        "200":
          description: Imported documents ordered by creation date.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Document"
    post:
      summary: Import a TXT document
      operationId: importTxtDocument
      tags:
        - documents
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DocumentImportRequest"
      responses:
        "201":
          description: Imported document with generated segments.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentDetail"
        "400":
          description: Text could not be segmented.
        "404":
          description: Project was not found.
  /documents/{document_id}:
    get:
      summary: Get document with segments
      operationId: getDocument
      tags:
        - documents
      parameters:
        - name: document_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Document details and segment list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentDetail"
        "404":
          description: Document was not found.
  /documents/{document_id}/segments:
    get:
      summary: List document segments
      operationId: listDocumentSegments
      tags:
        - documents
      parameters:
        - name: document_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Segments ordered by source position.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Segment"
        "404":
          description: Document was not found.
  /segments/{segment_id}:
    patch:
      summary: Save draft translation or segment status
      operationId: updateSegment
      tags:
        - segments
      parameters:
        - name: segment_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SegmentUpdateRequest"
      responses:
        "200":
          description: Updated segment.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Segment"
        "404":
          description: Segment was not found.
        "409":
          description: Segment is locked.
components:
  schemas:
    HealthResponse:
      type: object
      required:
        - status
        - service
        - version
      properties:
        status:
          type: string
          enum:
            - ok
        service:
          type: string
          example: cat-api
        version:
          type: string
          example: 0.1.0
    Project:
      type: object
      required:
        - id
        - name
        - source_language
        - target_language
        - created_at
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        source_language:
          type: string
        target_language:
          type: string
        domain:
          type:
            - string
            - "null"
        created_at:
          type: string
          format: date-time
    Document:
      type: object
      required:
        - id
        - project_id
        - filename
        - source_language
        - target_language
        - status
        - created_at
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        filename:
          type: string
        source_language:
          type: string
        target_language:
          type: string
        status:
          type: string
        created_at:
          type: string
          format: date-time
    DocumentImportRequest:
      type: object
      required:
        - filename
        - content
      properties:
        filename:
          type: string
          minLength: 1
          maxLength: 255
          example: sample.txt
        content:
          type: string
          minLength: 1
          example: Save the file. Close the window.
        source_language:
          type: string
          minLength: 2
          maxLength: 16
          default: en
        target_language:
          type: string
          minLength: 2
          maxLength: 16
          default: pl
        project_id:
          type:
            - string
            - "null"
          format: uuid
        project_name:
          type:
            - string
            - "null"
          maxLength: 200
        segmentation_strategy:
          type: string
          enum:
            - sentence
            - paragraph
          default: sentence
    DocumentDetail:
      type: object
      required:
        - document
        - segments
      properties:
        document:
          $ref: "#/components/schemas/Document"
        segments:
          type: array
          items:
            $ref: "#/components/schemas/Segment"
    Segment:
      type: object
      required:
        - id
        - document_id
        - position
        - source_text
        - status
        - locked
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        document_id:
          type: string
          format: uuid
        position:
          type: integer
        source_text:
          type: string
        target_text:
          type:
            - string
            - "null"
        status:
          type: string
          enum:
            - new
            - draft
            - translated
            - reviewed
            - approved
        locked:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    SegmentUpdateRequest:
      type: object
      properties:
        target_text:
          type:
            - string
            - "null"
        status:
          type: string
          enum:
            - new
            - draft
            - translated
            - reviewed
            - approved
