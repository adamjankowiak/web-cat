openapi: 3.1.0
info:
  title: Web CAT API
  version: 0.1.0
  description: Initial API contract for the Web CAT platform.
servers:
  - url: http://localhost:8000
paths:
  /health:
    get:
      summary: API healthcheck
      operationId: getHealth
      tags:
        - system
      responses:
        "200":
          description: API status and version.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /documents:
    get:
      summary: List imported documents
      operationId: listDocuments
      tags:
        - documents
      responses:
        "200":
          description: Imported documents ordered by creation date.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Document"
    post:
      summary: Import a TXT document
      operationId: importTxtDocument
      tags:
        - documents
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DocumentImportRequest"
      responses:
        "201":
          description: Imported document with generated segments.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentDetail"
        "400":
          description: Text could not be segmented.
        "404":
          description: Project was not found.
  /documents/{document_id}:
    get:
      summary: Get document with segments
      operationId: getDocument
      tags:
        - documents
      parameters:
        - name: document_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Document details and segment list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentDetail"
        "404":
          description: Document was not found.
  /documents/{document_id}/segments:
    get:
      summary: List document segments
      operationId: listDocumentSegments
      tags:
        - documents
      parameters:
        - name: document_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Segments ordered by source position.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Segment"
        "404":
          description: Document was not found.
  /segments/{segment_id}:
    patch:
      summary: Save draft translation or segment status
      operationId: updateSegment
      tags:
        - segments
      parameters:
        - name: segment_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SegmentUpdateRequest"
      responses:
        "200":
          description: Updated segment.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Segment"
        "404":
          description: Segment was not found.
        "409":
          description: Segment is locked or terminology validation failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TerminologyValidationErrorResponse"
  /segments/{segment_id}/approve:
    post:
      summary: Approve a segment and store it in translation memory
      operationId: approveSegment
      tags:
        - segments
      parameters:
        - name: segment_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Approved segment.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Segment"
        "400":
          description: Segment has no target text.
        "404":
          description: Segment was not found.
        "409":
          description: Segment is locked.
  /translation-memory/search:
    post:
      summary: Search translation memory suggestions
      operationId: searchTranslationMemory
      tags:
        - translation-memory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TranslationMemorySearchRequest"
      responses:
        "200":
          description: Ranked translation memory suggestions.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TranslationMemorySearchResponse"
  /translation-memory/entries:
    get:
      summary: List translation memory entries
      operationId: listTranslationMemoryEntries
      tags:
        - translation-memory
      parameters:
        - name: source_language
          in: query
          required: false
          schema:
            type: string
        - name: target_language
          in: query
          required: false
          schema:
            type: string
        - name: domain
          in: query
          required: false
          schema:
            type: string
        - name: project_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Translation memory entries ordered by creation date.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TranslationMemoryEntry"
    post:
      summary: Create a translation memory entry
      operationId: createTranslationMemoryEntry
      tags:
        - translation-memory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TranslationMemoryEntryCreateRequest"
      responses:
        "201":
          description: Created or reused translation memory entry.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TranslationMemoryEntry"
  /translation-memory/entries/{entry_id}:
    delete:
      summary: Delete a translation memory entry
      operationId: deleteTranslationMemoryEntry
      tags:
        - translation-memory
      parameters:
        - name: entry_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Entry deleted.
        "404":
          description: Translation memory entry was not found.
  /glossary/search:
    post:
      summary: Search glossary terms in source text
      operationId: searchGlossaryTerms
      tags:
        - glossary
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GlossarySearchRequest"
      responses:
        "200":
          description: Glossary terms found in the submitted source text.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GlossarySearchResponse"
  /glossary/terms:
    get:
      summary: List glossary terms
      operationId: listGlossaryTerms
      tags:
        - glossary
      parameters:
        - name: source_language
          in: query
          required: false
          schema:
            type: string
        - name: target_language
          in: query
          required: false
          schema:
            type: string
        - name: domain
          in: query
          required: false
          schema:
            type: string
        - name: project_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Glossary terms ordered by source and target term.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GlossaryTerm"
    post:
      summary: Create a glossary term
      operationId: createGlossaryTerm
      tags:
        - glossary
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GlossaryTermCreateRequest"
      responses:
        "201":
          description: Created glossary term.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GlossaryTerm"
  /glossary/terms/{term_id}:
    patch:
      summary: Update a glossary term
      operationId: updateGlossaryTerm
      tags:
        - glossary
      parameters:
        - name: term_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GlossaryTermUpdateRequest"
      responses:
        "200":
          description: Updated glossary term.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GlossaryTerm"
        "404":
          description: Glossary term was not found.
    delete:
      summary: Delete a glossary term
      operationId: deleteGlossaryTerm
      tags:
        - glossary
      parameters:
        - name: term_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Glossary term deleted.
        "404":
          description: Glossary term was not found.
  /glossary/import-csv:
    post:
      summary: Import glossary terms from CSV
      operationId: importGlossaryCsv
      tags:
        - glossary
      requestBody:
        required: true
        content:
          text/csv:
            schema:
              type: string
      responses:
        "201":
          description: Imported glossary terms.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GlossaryImportResponse"
        "400":
          description: CSV header or rows are invalid.
components:
  schemas:
    HealthResponse:
      type: object
      required:
        - status
        - service
        - version
      properties:
        status:
          type: string
          enum:
            - ok
        service:
          type: string
          example: cat-api
        version:
          type: string
          example: 0.1.0
    Project:
      type: object
      required:
        - id
        - name
        - source_language
        - target_language
        - created_at
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        source_language:
          type: string
        target_language:
          type: string
        domain:
          type:
            - string
            - "null"
        created_at:
          type: string
          format: date-time
    Document:
      type: object
      required:
        - id
        - project_id
        - filename
        - source_language
        - target_language
        - status
        - created_at
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        filename:
          type: string
        source_language:
          type: string
        target_language:
          type: string
        status:
          type: string
        created_at:
          type: string
          format: date-time
    DocumentImportRequest:
      type: object
      required:
        - filename
        - content
      properties:
        filename:
          type: string
          minLength: 1
          maxLength: 255
          example: sample.txt
        content:
          type: string
          minLength: 1
          example: Save the file. Close the window.
        source_language:
          type: string
          minLength: 2
          maxLength: 16
          default: en
        target_language:
          type: string
          minLength: 2
          maxLength: 16
          default: pl
        project_id:
          type:
            - string
            - "null"
          format: uuid
        project_name:
          type:
            - string
            - "null"
          maxLength: 200
        segmentation_strategy:
          type: string
          enum:
            - sentence
            - paragraph
          default: sentence
    DocumentDetail:
      type: object
      required:
        - document
        - segments
      properties:
        document:
          $ref: "#/components/schemas/Document"
        segments:
          type: array
          items:
            $ref: "#/components/schemas/Segment"
    Segment:
      type: object
      required:
        - id
        - document_id
        - position
        - source_text
        - status
        - locked
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        document_id:
          type: string
          format: uuid
        position:
          type: integer
        source_text:
          type: string
        target_text:
          type:
            - string
            - "null"
        status:
          type: string
          enum:
            - new
            - draft
            - translated
            - reviewed
            - approved
        locked:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    SegmentUpdateRequest:
      type: object
      properties:
        target_text:
          type:
            - string
            - "null"
        status:
          type: string
          enum:
            - new
            - draft
            - translated
            - reviewed
            - approved
    TranslationMemoryEntryCreateRequest:
      type: object
      required:
        - source_language
        - target_language
        - source_text
        - target_text
      properties:
        source_language:
          type: string
          minLength: 2
          maxLength: 16
        target_language:
          type: string
          minLength: 2
          maxLength: 16
        source_text:
          type: string
          minLength: 1
        target_text:
          type: string
          minLength: 1
        domain:
          type:
            - string
            - "null"
          maxLength: 128
        project_id:
          type:
            - string
            - "null"
          format: uuid
        created_by:
          type:
            - string
            - "null"
          format: uuid
    TranslationMemorySearchRequest:
      type: object
      required:
        - source_language
        - target_language
        - source_text
      properties:
        source_language:
          type: string
          minLength: 2
          maxLength: 16
        target_language:
          type: string
          minLength: 2
          maxLength: 16
        source_text:
          type: string
          minLength: 1
        domain:
          type:
            - string
            - "null"
          maxLength: 128
        project_id:
          type:
            - string
            - "null"
          format: uuid
        limit:
          type: integer
          minimum: 1
          maximum: 20
          default: 5
        min_score:
          type: integer
          minimum: 0
          maximum: 100
          default: 60
    TranslationMemorySearchResponse:
      type: object
      required:
        - suggestions
      properties:
        suggestions:
          type: array
          items:
            $ref: "#/components/schemas/TranslationMemorySuggestion"
    TranslationMemorySuggestion:
      type: object
      required:
        - entry
        - score
        - match_type
      properties:
        entry:
          $ref: "#/components/schemas/TranslationMemoryEntry"
        score:
          type: integer
          minimum: 0
          maximum: 100
        match_type:
          type: string
          enum:
            - exact
            - fuzzy
    TranslationMemoryEntry:
      type: object
      required:
        - id
        - source_language
        - target_language
        - source_text
        - target_text
        - normalized_source_text
        - created_at
      properties:
        id:
          type: string
          format: uuid
        source_language:
          type: string
        target_language:
          type: string
        source_text:
          type: string
        target_text:
          type: string
        normalized_source_text:
          type: string
        domain:
          type:
            - string
            - "null"
        project_id:
          type:
            - string
            - "null"
          format: uuid
        created_by:
          type:
            - string
            - "null"
          format: uuid
        created_at:
          type: string
          format: date-time
    GlossaryTermCreateRequest:
      type: object
      required:
        - source_language
        - target_language
        - source_term
        - target_term
      properties:
        project_id:
          type:
            - string
            - "null"
          format: uuid
        source_language:
          type: string
          minLength: 2
          maxLength: 16
        target_language:
          type: string
          minLength: 2
          maxLength: 16
        source_term:
          type: string
          minLength: 1
          maxLength: 255
        target_term:
          type: string
          minLength: 1
          maxLength: 255
        definition:
          type:
            - string
            - "null"
        domain:
          type:
            - string
            - "null"
          maxLength: 128
        case_sensitive:
          type: boolean
          default: false
        forbidden:
          type: boolean
          default: false
        example_source:
          type:
            - string
            - "null"
        example_target:
          type:
            - string
            - "null"
    GlossaryTermUpdateRequest:
      type: object
      properties:
        project_id:
          type:
            - string
            - "null"
          format: uuid
        source_language:
          type:
            - string
            - "null"
          minLength: 2
          maxLength: 16
        target_language:
          type:
            - string
            - "null"
          minLength: 2
          maxLength: 16
        source_term:
          type:
            - string
            - "null"
          minLength: 1
          maxLength: 255
        target_term:
          type:
            - string
            - "null"
          minLength: 1
          maxLength: 255
        definition:
          type:
            - string
            - "null"
        domain:
          type:
            - string
            - "null"
          maxLength: 128
        case_sensitive:
          type:
            - boolean
            - "null"
        forbidden:
          type:
            - boolean
            - "null"
        example_source:
          type:
            - string
            - "null"
        example_target:
          type:
            - string
            - "null"
    GlossarySearchRequest:
      type: object
      required:
        - source_language
        - target_language
        - source_text
      properties:
        source_language:
          type: string
          minLength: 2
          maxLength: 16
        target_language:
          type: string
          minLength: 2
          maxLength: 16
        source_text:
          type: string
          minLength: 1
        domain:
          type:
            - string
            - "null"
          maxLength: 128
        project_id:
          type:
            - string
            - "null"
          format: uuid
    GlossarySearchResponse:
      type: object
      required:
        - matches
      properties:
        matches:
          type: array
          items:
            $ref: "#/components/schemas/GlossaryTermMatch"
    GlossaryTermMatch:
      type: object
      required:
        - term
        - start
        - end
        - matched_text
      properties:
        term:
          $ref: "#/components/schemas/GlossaryTerm"
        start:
          type: integer
          minimum: 0
        end:
          type: integer
          minimum: 0
        matched_text:
          type: string
    GlossaryImportResponse:
      type: object
      required:
        - imported_count
        - terms
      properties:
        imported_count:
          type: integer
          minimum: 0
        terms:
          type: array
          items:
            $ref: "#/components/schemas/GlossaryTerm"
    GlossaryTerm:
      type: object
      required:
        - id
        - source_language
        - target_language
        - source_term
        - target_term
        - case_sensitive
        - forbidden
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type:
            - string
            - "null"
          format: uuid
        source_language:
          type: string
        target_language:
          type: string
        source_term:
          type: string
        target_term:
          type: string
        definition:
          type:
            - string
            - "null"
        domain:
          type:
            - string
            - "null"
        case_sensitive:
          type: boolean
        forbidden:
          type: boolean
        example_source:
          type:
            - string
            - "null"
        example_target:
          type:
            - string
            - "null"
    TerminologyViolation:
      type: object
      required:
        - term
        - violation_type
        - message
        - start
        - end
        - matched_text
      properties:
        term:
          $ref: "#/components/schemas/GlossaryTerm"
        violation_type:
          type: string
          enum:
            - missing_required
            - forbidden_present
        message:
          type: string
        start:
          type: integer
          minimum: 0
        end:
          type: integer
          minimum: 0
        matched_text:
          type: string
    TerminologyValidationError:
      type: object
      required:
        - violations
      properties:
        violations:
          type: array
          items:
            $ref: "#/components/schemas/TerminologyViolation"
    TerminologyValidationErrorResponse:
      type: object
      required:
        - detail
      properties:
        detail:
          $ref: "#/components/schemas/TerminologyValidationError"
