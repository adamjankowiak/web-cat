openapi: 3.1.0
info:
  title: Web CAT API
  version: 0.1.0
  description: Initial API contract for the Web CAT platform.
servers:
  - url: http://localhost:8000
paths:
  /health:
    get:
      summary: API healthcheck
      operationId: getHealth
      tags:
        - system
      responses:
        "200":
          description: API status and version.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
components:
  schemas:
    HealthResponse:
      type: object
      required:
        - status
        - service
        - version
      properties:
        status:
          type: string
          enum:
            - ok
        service:
          type: string
          example: cat-api
        version:
          type: string
          example: 0.1.0
    Project:
      type: object
      required:
        - id
        - name
        - source_language
        - target_language
        - created_at
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        source_language:
          type: string
        target_language:
          type: string
        domain:
          type:
            - string
            - "null"
        created_at:
          type: string
          format: date-time
    Document:
      type: object
      required:
        - id
        - project_id
        - filename
        - source_language
        - target_language
        - status
        - created_at
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        filename:
          type: string
        source_language:
          type: string
        target_language:
          type: string
        status:
          type: string
        created_at:
          type: string
          format: date-time
    Segment:
      type: object
      required:
        - id
        - document_id
        - position
        - source_text
        - status
        - locked
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        document_id:
          type: string
          format: uuid
        position:
          type: integer
        source_text:
          type: string
        target_text:
          type:
            - string
            - "null"
        status:
          type: string
        locked:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
